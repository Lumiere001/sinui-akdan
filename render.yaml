# Render Blueprint — 신의 악단 (sinui-akdan)
# 이 파일이 저장소 루트에 있으면 Render 대시보드의 "New Blueprint"를 통해
# 아래 두 서비스(Server + Client)를 한 번에 프로비저닝할 수 있다.
# 자세한 형식: https://render.com/docs/blueprint-spec

services:
  # ---------------- Backend (Express + Socket.io) ----------------
  - type: web
    name: sinui-akdan-server
    runtime: docker
    plan: free
    region: singapore
    rootDir: server
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: EXTRA_ALLOWED_ORIGINS
        sync: false

  # ---------------- Frontend (React + Vite SPA) ----------------
  - type: web
    name: sinui-akdan-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_SERVER_URL
        sync: false
      - key: VITE_KAKAO_MAP_KEY
        sync: false
    routes:
      # SPA fallback — 모든 라우트를 index.html로
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=604800, immutable
